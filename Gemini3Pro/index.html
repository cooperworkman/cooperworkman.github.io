<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V16 祥龍獻瑞</title>
    <style>
        :root {
            --symbol-height: 100px; 
            --reel-width: 110px;
            --gold: #ffd700;
            --frame-color: #4a0404;
            --bg-dark: #1a0505;
        }

        body {
            background-color: #2c0606;
            background-image: radial-gradient(circle at center, #600f0f 0%, #000000 100%);
            color: white;
            font-family: 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-y: auto; 
            padding: 20px 0;
        }

        h1 {
            font-size: 3rem;
            margin: 0 0 20px 0;
            color: var(--gold);
            text-shadow: 3px 3px 0 #800000, 0 0 20px rgba(255, 215, 0, 0.8);
            font-weight: 900;
            letter-spacing: 5px;
            background: linear-gradient(to bottom, #fff, #ffd700, #e67e22);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .machine-body {
            padding: 20px;
            background: var(--frame-color);
            border-radius: 20px;
            border: 6px solid #d35400;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
            z-index: 10; 
            flex-shrink: 0;
        }

        .machine-body::after {
            content: "";
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 4px solid #ffd700;
            border-radius: 30px;
            z-index: -1;
        }

        .window {
            display: flex;
            gap: 8px;
            background-color: var(--bg-dark);
            height: calc(var(--symbol-height) * 5);
            padding: 0 10px;
            overflow: hidden;
            position: relative;
            border: 3px solid #2c0606;
            border-radius: 10px;
            box-shadow: inset 0 0 50px #000;
        }

        .bezel-top, .bezel-bottom {
            position: absolute;
            left: 0; right: 0;
            height: var(--symbol-height);
            background: var(--frame-color);
            z-index: 20;
            box-shadow: 0 0 20px rgba(0,0,0,1);
        }

        .bezel-top {
            top: 0;
            border-bottom: 4px solid #600000;
            background: linear-gradient(to bottom, #5a0505 20%, #2b0202 100%);
        }

        .bezel-bottom {
            bottom: 0;
            border-top: 4px solid #600000;
            background: linear-gradient(to top, #5a0505 20%, #2b0202 100%);
        }

        .payline {
            position: absolute;
            left: 0; right: 0;
            height: 2px;
            background: rgba(255, 215, 0, 0.1);
            z-index: 5;
            pointer-events: none;
        }
        .line-mid { top: calc(var(--symbol-height) * 2.5); border-top: 1px dashed rgba(255,0,0,0.3); }
        .line-top { top: calc(var(--symbol-height) * 1.5); }
        .line-bot { top: calc(var(--symbol-height) * 3.5); }

        .reel {
            width: var(--reel-width);
            will-change: transform;
            display: flex;
            flex-direction: column;
        }

        .symbol {
            height: var(--symbol-height);
            min-height: var(--symbol-height); 
            max-height: var(--symbol-height);
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            background: linear-gradient(to bottom, #fffbf0, #f0e6c8);
            border-radius: 8px;
            border: 2px solid #d4ac0d;
            margin: 0; 
            padding: 5px;
            position: relative;
            box-shadow: inset 0 0 10px rgba(166, 124, 0, 0.2);
        }

        .symbol img {
            width: 90%;
            height: 90%;
            object-fit: contain;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));
            pointer-events: none; 
        }

        .symbol.blur {
            background: #dcd0b0;
            border-color: rgba(212, 172, 13, 0.3);
        }
        
        .symbol.blur img {
            filter: blur(4px);
            transform: scaleY(1.5) scaleX(0.9);
            opacity: 0.8;
        }

        .symbol.winner {
            background: #fffacd;
            border-color: #ff4500;
            z-index: 30;
            animation: popWin 0.8s infinite alternate;
            box-shadow: 0 0 30px #ffd700;
        }

        @keyframes popWin {
            0% { transform: scale(0.95); }
            100% { transform: scale(1.05); box-shadow: 0 0 50px #ffd700; }
        }

        .controls {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 500px;
            position: relative;
            z-index: 100;
            padding-bottom: 20px;
        }

        .dashboard {
            display: flex;
            justify-content: space-between;
            width: 100%;
            background: linear-gradient(90deg, #300, #500, #300);
            padding: 15px 20px;
            border-radius: 50px;
            border: 4px solid #b8860b;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        
        .dashboard span span { color: #ffd700; font-size: 1.4rem; }

        button {
            width: 100%;
            padding: 15px 0;
            font-size: 1.8rem;
            background: linear-gradient(to bottom, #ffeb3b, #f39c12);
            color: #5e3200;
            border: none;
            border-radius: 50px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 #b35c00, 0 10px 20px rgba(0,0,0,0.4);
            transition: transform 0.1s;
            text-shadow: 0 1px 0 rgba(255,255,255,0.5);
            letter-spacing: 2px;
        }

        button:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #b35c00;
        }
        
        button:disabled {
            background: #666;
            color: #aaa;
            box-shadow: 0 4px 0 #444;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <h1>🐲 祥龍獻瑞 🐲</h1>

    <div class="machine-body">
        <div class="window" id="reels-container">
            <div class="bezel-top"></div>
            <div class="bezel-bottom"></div>
            <div class="payline line-top"></div>
            <div class="payline line-mid"></div>
            <div class="payline line-bot"></div>
            <!-- 滾輪內容 -->
        </div>
    </div>

    <div class="controls">
        <div class="dashboard">
            <span>餘額: $<span id="balance">1000</span></span>
            <span>贏分: $<span id="win">0</span></span>
        </div>
        <button id="spin-btn" onclick="spin()">開始旋轉 (SPIN)</button>
    </div>

    <script>
        // --- SVG 圖片 ---
        const SVG_HEADER = "data:image/svg+xml;charset=utf-8,";

        const RAW_DRAGON = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#e6ffe6" stroke="#2ecc71" stroke-width="2"/><path d="M20 40 Q30 10 50 30 Q70 10 80 40" fill="#2ecc71"/><circle cx="50" cy="55" r="35" fill="#27ae60"/><path d="M35 30 L40 10 L45 30 M65 30 L60 10 L55 30" fill="#f1c40f" stroke="#d35400" stroke-width="2"/><circle cx="40" cy="50" r="5" fill="white"/><circle cx="60" cy="50" r="5" fill="white"/><circle cx="40" cy="50" r="2" fill="black"/><circle cx="60" cy="50" r="2" fill="black"/><path d="M30 65 Q50 80 70 65" stroke="#c0392b" stroke-width="3" fill="none"/><text x="50" y="90" font-size="12" text-anchor="middle" fill="#145a32" font-weight="bold">龍</text></svg>`;
        const RAW_PEARL = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><radialGradient id="grad1" cx="30%" cy="30%" r="70%"><stop offset="0%" style="stop-color:white;stop-opacity:1" /><stop offset="100%" style="stop-color:#00bfff;stop-opacity:1" /></radialGradient></defs><circle cx="50" cy="50" r="40" fill="url(#grad1)" stroke="#00bfff" stroke-width="2"/><circle cx="35" cy="35" r="10" fill="white" opacity="0.5"/></svg>`;
        const RAW_INGOT = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M10 35 Q50 -5 90 35 L85 65 Q50 95 15 65 Z" fill="#ffd700" stroke="#b8860b" stroke-width="2"/><ellipse cx="50" cy="35" rx="35" ry="12" fill="#fffacd"/><text x="50" y="75" font-size="14" text-anchor="middle" fill="#8b4500" font-weight="bold">元寶</text></svg>`;
        const RAW_COIN = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#f39c12" stroke="#d35400" stroke-width="3"/><rect x="38" y="38" width="24" height="24" fill="white" stroke="#d35400" stroke-width="2"/><text x="50" y="25" font-size="12" text-anchor="middle" fill="#8b0000" font-weight="bold">招財</text><text x="50" y="85" font-size="12" text-anchor="middle" fill="#8b0000" font-weight="bold">進寶</text></svg>`;
        const RAW_LANTERN = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect x="48" y="0" width="4" height="10" fill="#333"/><ellipse cx="50" cy="45" rx="35" ry="38" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/><rect x="30" y="8" width="40" height="8" fill="#f1c40f"/><rect x="30" y="80" width="40" height="8" fill="#f1c40f"/><text x="50" y="55" font-size="28" text-anchor="middle" fill="#f1c40f" font-family="serif" font-weight="bold">福</text></svg>`;
        const RAW_FIRECRACKER = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect x="25" y="15" width="50" height="70" rx="5" fill="#ff4500" stroke="#8b0000" stroke-width="2"/><path d="M25 30 L75 30 M25 50 L75 50 M25 70 L75 70" stroke="#ffd700" stroke-width="3"/><path d="M50 15 L50 5 L55 0" stroke="#333" stroke-width="2" fill="none"/><text x="50" y="60" font-size="30" text-anchor="middle" fill="#ffd700" font-weight="bold">旺</text></svg>`;

        function encodeSVG(svgString) { return SVG_HEADER + encodeURIComponent(svgString); }

        const SYMBOLS = [
            { id: "dragon", img: encodeSVG(RAW_DRAGON), value: 50, weight: 2 },
            { id: "pearl",  img: encodeSVG(RAW_PEARL),  value: 25, weight: 5 },
            { id: "ingot",  img: encodeSVG(RAW_INGOT),  value: 15, weight: 10 },
            { id: "coin",   img: encodeSVG(RAW_COIN),   value: 10, weight: 15 },
            { id: "lantern",img: encodeSVG(RAW_LANTERN),value: 5,  weight: 20 },
            { id: "fire",   img: encodeSVG(RAW_FIRECRACKER), value: 2, weight: 25 }
        ];

        const REEL_COUNT = 5;
        const ACTIVE_ROWS = 3; 
        const TOTAL_ROWS = 5; 
        const SYMBOL_HEIGHT = 100; 
        const SPIN_LENGTH = 30; 

        let balance = 1000;
        let isSpinning = false;
        let reelElements = [];
        let symbolPool = [];

        SYMBOLS.forEach(s => { for(let i=0; i<s.weight; i++) symbolPool.push(s); });
        function getRandomSymbolObj() { return symbolPool[Math.floor(Math.random() * symbolPool.length)]; }

        function createSymbolNode(symbolObj, type='normal') {
            const div = document.createElement('div');
            div.className = `symbol${type === 'blur' ? ' blur' : ''}`;
            const img = document.createElement('img');
            img.src = symbolObj.img;
            img.alt = symbolObj.id;
            div.appendChild(img);
            return div;
        }

        function init() {
            const container = document.getElementById('reels-container');
            container.querySelectorAll('.reel').forEach(el => el.remove());
            reelElements = [];
            for (let i = 0; i < REEL_COUNT; i++) {
                const reel = document.createElement('div');
                reel.className = 'reel';
                for(let r=0; r<TOTAL_ROWS; r++) { 
                    reel.appendChild(createSymbolNode(getRandomSymbolObj())); 
                }
                container.appendChild(reel);
                reelElements.push(reel);
            }
        }

        init();

        // ★ 核心修改：控制盤面邏輯 (Rigged Logic) ★
        function generateOutcome(winRate) {
            // 1. 決定是贏還是輸
            const isWin = Math.random() < winRate;
            
            // 2. 先生成一個完全隨機的盤面
            let grid = []; // 5 Columns x 3 Rows
            for(let c=0; c<REEL_COUNT; c++) {
                let col = [];
                for(let r=0; r<ACTIVE_ROWS; r++) col.push(getRandomSymbolObj());
                grid.push(col);
            }

            if (isWin) {
                // --- 強制中獎邏輯 ---
                // 決定哪一條線中獎 (0, 1, 2)
                const winRow = Math.floor(Math.random() * ACTIVE_ROWS);
                // 決定中獎的符號 (根據權重選，這樣不會每次都是龍)
                const winSymbol = getRandomSymbolObj();
                // 決定連線數量 (3, 4, 或 5)
                const rand = Math.random();
                let winCount = 3;
                if (rand < 0.3) winCount = 4;
                if (rand < 0.1) winCount = 5;

                // 覆蓋盤面
                for (let c = 0; c < winCount; c++) {
                    grid[c][winRow] = winSymbol;
                }
                
                // console.log(`[Cheat] 強制中獎! Row:${winRow} Symbol:${winSymbol.id} Count:${winCount}`);

            } else {
                // --- 強制不中獎邏輯 ---
                // 檢查每一行，如果發現有 3 個一樣的，就破壞它
                for (let r = 0; r < ACTIVE_ROWS; r++) {
                    // 檢查前三個是否相同
                    if (grid[0][r].id === grid[1][r].id && grid[1][r].id === grid[2][r].id) {
                        // 如果相同，換掉第 3 個符號，直到它不相同為止
                        let originalId = grid[2][r].id;
                        do {
                            grid[2][r] = getRandomSymbolObj();
                        } while (grid[2][r].id === originalId);
                        
                        // console.log(`[Cheat] 破壞了 Row:${r} 的自然中獎`);
                    }
                }
            }
            return grid;
        }

        async function spin() {
            if (isSpinning) return;
            const bet = 20;
            if (balance < bet) return alert("餘額不足！");

            balance -= bet;
            updateUI(0);
            isSpinning = true;
            document.getElementById('spin-btn').disabled = true;
            document.querySelectorAll('.winner').forEach(el => el.classList.remove('winner'));

            // ★ 這裡調用新的控制邏輯，設定 0.5 (50%) 中獎率 ★
            const activeResultGrid = generateOutcome(0.5);
            
            // 產生 Buffer 區域 (純視覺)
            const topBuffer = [];
            const botBuffer = [];
            for(let i=0; i<REEL_COUNT; i++) {
                topBuffer.push(getRandomSymbolObj());
                botBuffer.push(getRandomSymbolObj());
            }

            // 轉動動畫 (維持 V15 的 DOM 保留技術)
            const promises = reelElements.map((reel, index) => {
                // 這裡要注意：activeResultGrid 是 [col][row]
                const fullColumn = [topBuffer[index], ...activeResultGrid[index], botBuffer[index]];
                return spinReel(reel, index, fullColumn);
            });

            await Promise.all(promises);
            checkWin(activeResultGrid, bet);

            isSpinning = false;
            document.getElementById('spin-btn').disabled = false;
        }

        function spinReel(reel, index, fullColumn) {
            return new Promise(resolve => {
                const fragment = document.createDocumentFragment();
                
                const blurCount = SPIN_LENGTH + (index * 5);
                const blurNodes = [];
                for(let k=0; k<blurCount; k++) {
                    blurNodes.push(createSymbolNode(getRandomSymbolObj(), 'blur'));
                }

                const targetNodes = [];
                fullColumn.forEach(s => targetNodes.push(createSymbolNode(s)));

                targetNodes.forEach(node => fragment.appendChild(node));
                blurNodes.forEach(node => fragment.appendChild(node));

                reel.insertBefore(fragment, reel.firstChild);

                const addedHeight = (fullColumn.length + blurNodes.length) * SYMBOL_HEIGHT;

                reel.style.transform = `translateY(-${addedHeight}px)`;

                // V7 物理參數
                const animation = reel.animate([
                    { transform: `translateY(-${addedHeight}px)`, offset: 0 },
                    { transform: `translateY(-${addedHeight + 60}px)`, offset: 0.15 }, 
                    { transform: `translateY(30px)`, offset: 0.65 },
                    { transform: `translateY(-10px)`, offset: 0.85 },
                    { transform: `translateY(0px)`, offset: 1 }
                ], {
                    duration: 2000 + (index * 300),
                    easing: 'cubic-bezier(0.45, 0.05, 0.55, 0.95)',
                    fill: 'forwards'
                });

                animation.onfinish = () => {
                    while (reel.children.length > TOTAL_ROWS) {
                        reel.lastElementChild.remove();
                    }
                    reel.style.transform = 'translateY(0)';
                    animation.cancel(); 
                    resolve();
                };
            });
        }

        function checkWin(grid, bet) {
            let totalWin = 0;
            const lineBet = bet / 3;

            // activeResultGrid 是 [col][row]，我們需要遍歷 Row
            for(let r=0; r<ACTIVE_ROWS; r++) {
                const firstId = grid[0][r].id;
                let count = 1;
                for(let c=1; c<REEL_COUNT; c++) {
                    if(grid[c][r].id === firstId) count++;
                    else break;
                }

                if(count >= 3) {
                    const data = SYMBOLS.find(s => s.id === firstId);
                    let mult = count === 5 ? 10 : (count === 4 ? 3 : 1);
                    totalWin += lineBet * data.value * mult;

                    for(let c=0; c<count; c++) {
                        setTimeout(() => {
                            const domIndex = r + 1;
                            const cell = reelElements[c].children[domIndex];
                            if(cell) cell.classList.add('winner');
                        }, c * 100);
                    }
                }
            }

            balance += totalWin;
            updateUI(totalWin);
        }

        function updateUI(win) {
            document.getElementById('balance').textContent = Math.floor(balance);
            document.getElementById('win').textContent = Math.floor(win);
        }
    </script>
</body>
</html>
